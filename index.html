<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Through My Lens</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0a0a0a;
      font-family: Georgia, 'Times New Roman', serif;
      min-height: 100vh;
    }

    .portfolio-wrap {
      padding: 2.5rem 2rem 4rem;
      max-width: 960px;
      margin: 0 auto;
    }

    .portfolio-header {
      margin-bottom: 2rem;
      padding-bottom: 1.5rem;
      border-bottom: 0.5px solid rgba(255,255,255,0.1);
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 1rem;
    }

    .portfolio-title {
      font-size: 2.4rem;
      font-weight: 400;
      color: #f5f5f0;
      letter-spacing: -0.02em;
      line-height: 1.1;
    }

    .portfolio-title span {
      font-family: Arial, sans-serif;
      font-weight: 400;
      color: rgba(255,255,255,0.4);
      display: block;
      margin-bottom: 0.3rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      font-size: 11px;
    }

    .photo-count {
      font-family: Arial, sans-serif;
      font-size: 13px;
      color: rgba(255,255,255,0.3);
    }

    .filters {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 1.5rem;
      flex-wrap: wrap;
    }

    .filter-label {
      font-family: Arial, sans-serif;
      font-size: 11px;
      color: rgba(255,255,255,0.35);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-right: 4px;
    }

    .filter-btn {
      font-family: Arial, sans-serif;
      font-size: 12px;
      padding: 5px 16px;
      border-radius: 20px;
      border: 0.5px solid rgba(255,255,255,0.15);
      background: transparent;
      color: rgba(255,255,255,0.5);
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .filter-btn:hover {
      border-color: rgba(255,255,255,0.35);
      color: rgba(255,255,255,0.8);
    }

    .filter-btn.active {
      background: #f5f5f0;
      color: #0a0a0a;
      border-color: #f5f5f0;
      font-weight: 600;
    }

    .masonry {
      columns: 3;
      column-gap: 10px;
    }

    @media (max-width: 700px) {
      .masonry { columns: 2; }
      .portfolio-title { font-size: 1.8rem; }
    }

    @media (max-width: 420px) {
      .masonry { columns: 1; }
    }

    .photo-item {
      break-inside: avoid;
      margin-bottom: 10px;
      position: relative;
      overflow: hidden;
      border-radius: 8px;
      cursor: pointer;
      background: #1a1a1a;
    }

    .photo-item.hidden { display: none; }

    .photo-item img {
      width: 100%;
      display: block;
      transition: transform 0.4s ease;
    }

    .photo-item:hover img { transform: scale(1.04); }

    .photo-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(to top, rgba(0,0,0,0.55) 0%, transparent 50%);
      opacity: 0;
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      padding: 10px 12px;
      transition: opacity 0.3s ease;
    }

    .photo-item:hover .photo-overlay { opacity: 1; }

    .photo-tag {
      font-family: Arial, sans-serif;
      font-size: 11px;
      color: rgba(255,255,255,0.85);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      font-weight: 600;
    }

    .photo-year-badge {
      font-family: Arial, sans-serif;
      font-size: 11px;
      color: rgba(255,255,255,0.6);
    }

    .empty-state {
      display: none;
      text-align: center;
      padding: 4rem 1rem;
      color: rgba(255,255,255,0.25);
      font-family: Arial, sans-serif;
      font-size: 14px;
    }

    .footer {
      margin-top: 3rem;
      padding-top: 1.5rem;
      border-top: 0.5px solid rgba(255,255,255,0.08);
      font-family: Arial, sans-serif;
      font-size: 13px;
      color: rgba(255,255,255,0.2);
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="portfolio-wrap">
    <header class="portfolio-header">
      <div class="portfolio-title">
        <span>through my lens</span>
        A collection of moments
      </div>
      <div class="photo-count" id="count"></div>
    </header>

    <div class="filters" id="filters">
      <span class="filter-label">Year</span>
    </div>

    <div class="masonry" id="gallery"></div>
    <div class="empty-state" id="empty">No photos for this year yet.</div>

    <div class="footer">&copy; 2025 &nbsp;&middot;&nbsp; Through My Lens</div>
  </div>

  <script>
    const tags = [
      "analog", "film", "35mm", "street", "portrait",
      "golden hour", "architecture", "travel", "candid",
      "nature", "texture", "urban", "light & shadow",
      "everyday", "moody", "flora", "people", "places"
    ];

    function getYear(i) {
      if (i <= 70)  return 2022;
      if (i <= 140) return 2023;
      if (i <= 210) return 2024;
      return 2025;
    }

    const photos = [];
    for (let i = 1; i <= 279; i++) {
      photos.push({
        src: `photos/photo${i}.JPG`,
        tag: tags[(i - 1) % tags.length],
        year: getYear(i)
      });
    }

    const years = ["All", ...Array.from(new Set(photos.map(p => p.year))).sort()];
    const gallery = document.getElementById("gallery");
    const filtersEl = document.getElementById("filters");
    const countEl = document.getElementById("count");
    const emptyEl = document.getElementById("empty");
    let activeYear = "All";

    years.forEach(yr => {
      const btn = document.createElement("button");
      btn.className = "filter-btn" + (yr === "All" ? " active" : "");
      btn.textContent = yr;
      btn.onclick = () => {
        activeYear = yr;
        document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
        btn.classList.add("active");
        filterPhotos();
      };
      filtersEl.appendChild(btn);
    });

    const items = [];

    photos.forEach(p => {
      const item = document.createElement("div");
      item.className = "photo-item";
      item.dataset.year = p.year;

      const img = document.createElement("img");
      img.src = p.src;
      img.alt = p.tag;
      img.loading = "lazy";

      const overlay = document.createElement("div");
      overlay.className = "photo-overlay";
      overlay.innerHTML = `<span class="photo-tag">${p.tag}</span><span class="photo-year-badge">${p.year}</span>`;

      item.appendChild(img);
      item.appendChild(overlay);
      gallery.appendChild(item);
      items.push(item);
    });

    function filterPhotos() {
      let visible = 0;
      items.forEach(item => {
        const show = activeYear === "All" || item.dataset.year === String(activeYear);
        item.classList.toggle("hidden", !show);
        if (show) visible++;
      });
      countEl.textContent = visible + " photo" + (visible !== 1 ? "s" : "");
      emptyEl.style.display = visible === 0 ? "block" : "none";
      gallery.style.display = visible === 0 ? "none" : "";
    }

    filterPhotos();
  </script>
</body>
</html>
